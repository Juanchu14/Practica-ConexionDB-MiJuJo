<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIJUJO | Concesionario Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-controls">
        <h1>MIJUJO <span>MOTORS</span></h1>
        
        <div class="filtro-container" style="display: contents;">
            <input type="text" id="buscador" placeholder="Buscar modelo (ej: AMG GT)..." oninput="renderizarVehiculos()">
            
            <select id="orden" onchange="renderizarVehiculos()">
                <option value="asc">Nombre (A-Z)</option>
                <option value="desc">Nombre (Z-A)</option>
            </select>

            <a href="formulario.html" class="btn">+ Añadir Vehículo</a>
        </div>
    </header>

    <main id="lista-vehiculos" class="vehiculos-grid">
        <p style="grid-column: 1/-1; color: var(--text-muted);">Cargando catálogo de unidades...</p>
    </main>

    <script src="app.js"></script>
</body>
</html>
