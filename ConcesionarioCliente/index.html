<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCESIONARIO MIJUJO - Elite Cars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CONCESIONARIO MIJUJO</h1>

    <div class="header-controls filtro-container">
        <a href="formulario.html" class="btn">+ Añadir Nuevo Vehículo</a>
        
        <div style="flex-grow: 1; max-width: 400px;">
            <input type="text" id="buscador" placeholder="Buscar modelo (ej: AMG GT)..." oninput="renderizarVehiculos()">
        </div>
        
        <div>
            <select id="orden" onchange="renderizarVehiculos()">
                <option value="asc">Ordenar alfabéticamente (A-Z)</option>
                <option value="desc">Ordenar alfabéticamente (Z-A)</option>
            </select>
        </div>
    </div>

    <div id="lista-vehiculos" class="vehiculos-grid">
        <p style="text-align: center; grid-column: 1/-1;">Conectando con el motor del servidor...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
