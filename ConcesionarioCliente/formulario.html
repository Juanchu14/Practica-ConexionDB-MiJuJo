<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículo - Concesionario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1 id="titulo-formulario" style="margin-top: 0;">Añadir Vehículo</h1>
        
        <form id="vehiculo-form">
            <input type="hidden" id="vehiculo-id">

            <div class="form-group">
                <label for="nombre">Modelo del Vehículo:</label>
                <input type="text" id="nombre" placeholder="Ej: Mercedes-AMG C63" required>
            </div>

            <div class="form-group">
                <label for="stock">Unidades en Stock:</label>
                <input type="number" id="stock" min="0" placeholder="0" required>
            </div>

            <div class="form-group">
                <label for="imagen">Foto del Vehículo:</label>
                <input type="file" id="imagen" accept="image/png, image/jpeg">
                <p id="imagen-help">ℹ️ Deja este campo vacío para mantener la foto actual.</p>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <input type="submit" value="Guardar en Inventario" style="flex: 2;">
                <a href="index.html" class="btn btn-cancel" style="flex: 1; text-align: center;">Volver</a>
            </div>
        </form>
    </div>

    <script src="formulario.js"></script>
</body>
</html>
